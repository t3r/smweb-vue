# Merge patch/minor Dependabot PRs automatically when CI is green.
# Major (and security) PRs stay open for human review — enable repo notifications
# for PRs or watch the repo to see them.
#
# Requires: Settings → General → "Allow auto-merge" enabled, and branch protection
# rules that either do not require review for dependabot[bot] or use a bypass.
name: Dependabot auto-merge (patch / minor)

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch and minor only)
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
