# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Root app + tooling
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 15
    versioning-strategy: increase
    groups:
      # One batched PR per week for non-breaking dependency bumps
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
    # Semver-major updates do not match the group → Dependabot opens a separate PR per
    # dependency (review queue / notification — no auto-merge in dependabot-auto-merge.yml).

  - package-ecosystem: npm
    directory: /lambda/email-queue-worker
    schedule:
      interval: weekly
      day: monday
      time: "06:05"
      timezone: Etc/UTC
    open-pull-requests-limit: 8
    versioning-strategy: increase
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:10"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
